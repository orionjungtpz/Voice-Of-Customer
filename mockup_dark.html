<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Signage — Lenovo Tab Mockup</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100vw;height:100vh;overflow:hidden;
    background:#111;
    display:flex;align-items:center;justify-content:center;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse 80% 60% at 50% 50%, #1a1a2e 0%, #0a0a0a 100%);
    z-index:0;
  }
  .scene{position:relative;z-index:1;}

  /* ── 레노버 태블릿 프레임 ── */
  .tablet{
    position:relative;
    width:960px;height:640px;
    background:linear-gradient(160deg, #2e2e2e 0%, #1c1c1c 40%, #252525 100%);
    border-radius:22px;
    box-shadow:
      0 0 0 1px #111,
      0 0 0 2px #3a3a3a,
      0 40px 100px rgba(0,0,0,0.8),
      0 10px 30px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
    padding:18px;
  }
  /* 좌측 전원 버튼 */
  .tablet::before{
    content:'';position:absolute;
    left:-3px;top:120px;width:3px;height:44px;
    background:linear-gradient(to bottom,#2a2a2a,#333,#2a2a2a);
    border-radius:2px 0 0 2px;box-shadow:-1px 0 3px rgba(0,0,0,0.5);
  }
  /* 우측 볼륨 버튼 */
  .tablet::after{
    content:'';position:absolute;
    right:-3px;top:100px;width:3px;height:60px;
    background:linear-gradient(to bottom,#2a2a2a,#333,#2a2a2a);
    border-radius:0 2px 2px 0;box-shadow:1px 0 3px rgba(0,0,0,0.5);
  }

  /* 카메라 */
  .camera-bar{position:absolute;top:7px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;}
  .camera{width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3a3a3a,#111);border:1px solid #0a0a0a;box-shadow:0 0 0 1px rgba(255,255,255,0.05);}

  /* Lenovo 로고 */
  .lenovo-logo{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;letter-spacing:3px;color:#3a3a3a;text-transform:uppercase;font-family:sans-serif;}

  /* LED 스트립 */
  .led-strip{
    position:absolute;left:-5px;top:30%;bottom:30%;width:4px;
    background:linear-gradient(to bottom,transparent 0%,#e63946 20%,#ff5566 50%,#e63946 80%,transparent 100%);
    border-radius:2px;filter:blur(0.5px);
    box-shadow:0 0 8px #e63946,0 0 16px rgba(230,57,70,0.4);
    animation:ledPulse 2s ease-in-out infinite;
  }
  @keyframes ledPulse{
    0%,100%{opacity:0.7;box-shadow:0 0 6px #e63946,0 0 12px rgba(230,57,70,0.3);}
    50%{opacity:1;box-shadow:0 0 12px #e63946,0 0 24px rgba(230,57,70,0.5);}
  }

  /* 스크린 */
  .screen{width:100%;height:100%;background:#000;border-radius:8px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.8);}
  .screen iframe{width:1280px;height:800px;border:none;transform-origin:top left;transform:scale(0.726);display:block;pointer-events:auto;}

  /* 그림자 */
  .stand-shadow{position:absolute;bottom:-24px;left:10%;right:10%;height:24px;background:radial-gradient(ellipse at center,rgba(0,0,0,0.6) 0%,transparent 70%);filter:blur(8px);}
  .desk{position:absolute;bottom:-8px;left:-60px;right:-60px;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.06),transparent);}
</style>
</head>
<body>
<div class="scene">
  <div class="tablet">
    <div class="camera-bar"><div class="camera"></div></div>
    <div class="lenovo-logo">Lenovo</div>
    <div class="led-strip"></div>
    <div class="screen">
      <iframe src="signage_dark.html" scrolling="no"></iframe>
    </div>
    <div class="stand-shadow"></div>
    <div class="desk"></div>
  </div>
</div>
</body>
</html>
