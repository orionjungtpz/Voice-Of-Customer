name: Fetch News Daily

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 08:00 KST (UTC 23:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Fetch news and save JSON
        run: python fetch_news.py

      - name: Commit and push news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "chore: update news.json [skip ci]"
          git push
